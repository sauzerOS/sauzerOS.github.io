From scratch source distro and package manager <a href="hokuto.html">hokuto</a> <br>
Supports from source or binary packages<br>
Based on <a href="https://archlinux.org/">Arch Linux</a> and <a href="https://linuxfromscratch.org/">LFS</a> + subprojects<br>
<br>
Main Features:<br>
<br>
- Systemd<br>
- Kernel with cachyos patches<br>
- Xlibre<br>
- Kde plasma<br>
- Xfce<br>
- Multilib support for gaming<br>
